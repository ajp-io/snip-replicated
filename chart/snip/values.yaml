## Snip — URL shortener Helm chart values

## Allow proxied (non-Bitnami-registry) images in subcharts
global:
  security:
    allowInsecureImages: true

## Number of app replicas
replicaCount: 1

image:
  repository: proxy.alexparker.info/proxy/snip-enterprise/index.docker.io/ajpio/snip
  tag: "0.2.5"
  pullPolicy: IfNotPresent

## Base URL of the app (used to build short links)
## e.g. https://snip.example.com
baseURL: ""

service:
  ## ClusterIP | NodePort | LoadBalancer
  type: ClusterIP
  port: 80
  targetPort: 8080

## Optional Ingress
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: snip.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

## TLS / certificate mode
## Requires ingress.enabled: true to be exposed via HTTPS.
## Options:
##   selfsigned — cert-manager generates a self-signed cert (requires cert-manager in cluster)
##   auto       — cert-manager provisions via a ClusterIssuer, e.g. Let's Encrypt (requires cert-manager)
##   manual     — reference a pre-existing TLS Secret; no cert-manager required
tls:
  mode: selfsigned
  ## mode: manual — name of the pre-existing Secret containing tls.crt and tls.key
  secretName: ""
  ## mode: auto — name of the ClusterIssuer to use (e.g. letsencrypt-prod)
  issuerName: ""

## Resource requests and limits
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

## Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

## External database (BYO) — set postgresql.enabled=false to use this
externalDatabase:
  host: ""
  port: 5432
  name: snip
  user: snip
  ## Name of an existing Secret with key "password"
  existingSecret: ""
  password: ""

## External Redis (BYO) — set redis.enabled=false to use this
externalRedis:
  host: ""
  port: 6379
  ## Name of an existing Secret with key "password"
  existingSecret: ""
  password: ""

## Optional SMTP server — when enabled, preflight checks TCP connectivity
smtp:
  enabled: false
  host: ""
  port: 587

## Replicated SDK subchart — renamed for branding
replicated:
  nameOverride: snip-sdk
  image:
    registry: proxy.alexparker.info
  imagePullSecrets:
    - name: enterprise-pull-secret

## Embedded PostgreSQL subchart (bitnami/postgresql)
## Set enabled: false to use externalDatabase above
postgresql:
  enabled: true
  image:
    registry: proxy.alexparker.info/proxy/snip-enterprise/index.docker.io
    tag: latest
  global:
    imagePullSecrets:
      - enterprise-pull-secret
  auth:
    username: snip
    password: snip
    database: snip
  primary:
    persistence:
      enabled: true
      size: 1Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

## Embedded Redis subchart (bitnami/redis)
## Set enabled: false to use externalRedis above
redis:
  enabled: true
  image:
    registry: proxy.alexparker.info/proxy/snip-enterprise/index.docker.io
    tag: latest
  global:
    imagePullSecrets:
      - enterprise-pull-secret
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

## Pod annotations
podAnnotations: {}

## Pod security context
podSecurityContext: {}

## Container security context
securityContext: {}

## Node selector, tolerations, affinity
nodeSelector: {}
tolerations: []
affinity: {}

## Service account
serviceAccount:
  create: true
  name: ""
  annotations: {}
