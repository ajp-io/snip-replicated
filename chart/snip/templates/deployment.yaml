apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "snip.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "snip.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "snip.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "snip.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "snip.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              {{- if .Values.postgresql.enabled }}
              until nc -z {{ include "snip.fullname" . }}-postgresql 5432; do
                echo "Waiting for PostgreSQL..."; sleep 2;
              done
              {{- else }}
              until nc -z {{ .Values.externalDatabase.host }} {{ .Values.externalDatabase.port }}; do
                echo "Waiting for PostgreSQL..."; sleep 2;
              done
              {{- end }}
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: snip
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: BASE_URL
              value: {{ .Values.baseURL | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "snip.databaseSecretName" . }}
                  key: {{ include "snip.databaseSecretKey" . }}
            - name: DATABASE_URL
              value: {{ include "snip.databaseURL" . | quote }}
            - name: REDIS_URL
              value: {{ include "snip.redisURL" . | quote }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
